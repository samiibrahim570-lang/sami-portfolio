<section class="skills" id="skills">
  <div class="container">
    <div class="section-header reveal">
      <span class="section-label">// tech stack</span>
      <h2 class="section-title">Skills & <span>Expertise</span></h2>
      <p class="section-desc">Technologies I work with to build enterprise-grade solutions</p>
    </div>

    <div class="skills-grid">
      <div class="skill-group reveal" *ngFor="let group of skillGroups; let i = index" [style.animation-delay]="i * 0.1 + 's'">
        <div class="group-header">
          <span class="group-icon">{{ group.icon }}</span>
          <h3>{{ group.category }}</h3>
        </div>

        <div class="skill-list">
          <div class="skill-item" *ngFor="let skill of group.skills">
            <div class="skill-info">
              <span class="skill-name">{{ skill.name }}</span>
              <span class="skill-pct">{{ skill.level }}%</span>
            </div>
            <div class="skill-bar">
              <div class="skill-fill"
                   [style.width.%]="skill.level"
                   [style.background]="'linear-gradient(90deg, ' + skill.color + ', ' + skill.color + '99)'">
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
